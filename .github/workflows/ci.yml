name: iOS PR Checks

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-smoke:
    runs-on: macos-15
    steps:
      - name: Checkout
      uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild \
            -project ShondonDHApp.xcodeproj \
            -scheme ShondonDHApp \
            -destination "generic/platform=iOS" \
            -quiet build

      - name: Firebase Rules Smoke Checks
        run: bash scripts/ci/firebase_rules_smoke.sh

      - name: App Smoke Checks
        run: bash scripts/ci/app_smoke_checks.sh
